global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/prometheus_alerts.yml'

scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenClaw Health & Metrics Server
  - job_name: 'openclaw'
    static_configs:
      - targets: ['openclaw-app:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Redis Exporter (可选，用于 Redis 监控)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # n8n Workflow Platform
  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']
    metrics_path: '/metrics'
    scrape_interval: 30s
