# Redis production configuration for OpenClaw
# ============================================

# 绑定地址 (生产环境应仅绑定内部网络)
bind 0.0.0.0

# 端口
port 6379

# 密码认证
requirepass ${REDIS_PASSWORD:-redis_password_change_me}

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB 快照 (5分钟一次)
save 900 1
save 300 10
save 60 10000

# 最大内存
maxmemory 256mb
maxmemory-policy allkeys-lru

# 内存优化
activerehashing yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes

# 日志
loglevel notice
logfile ""

# 安全
protected-mode yes
